services:
  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tomato-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - auth-service
    networks:
      - frontend-network # ← Only connected to frontend network

  # Backend auth service
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - PORT=${PORT}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}
      - CLIENT_URL=${CLIENT_URL}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - frontend-network # ← Can talk to frontend
      - backend-network # ← Can talk to database

  # MongoDB database
  mongodb:
    image: mongo:latest
    container_name: auth-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
      - MONGO_INITDB_DATABASE=auth_db
    # ports:
    #   - '27017:27017'  # ← REMOVED! No external access
    volumes:
      - ./data/mongodb:/data/db
      - ./data/mongodb-config:/data/configdb
    networks:
      - backend-network # ← Only backend services can access
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
