name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tomato-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_NAMESPACE: rakib2017
  FRONTEND_IMAGE: rakib2017/tomato-frontend
  AUTH_IMAGE: rakib2017/tomato-auth-service

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  auth-service-ci:
    name: Auth Service CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint auth service
        run: npm run lint

      - name: Build auth service
        run: npm run build

      - name: Test auth service
        run: npm test -- --passWithNoTests

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - auth-service-ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build auth-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth-service
          file: ./services/auth-service/Dockerfile
          push: false
          tags: ${{ env.AUTH_IMAGE }}:${{ github.sha }}

  publish-images:
    name: Build Locally and Push Docker Hub Images
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend image locally
        run: |
          docker build \
            --file ./frontend/Dockerfile \
            --tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend

      - name: Build auth-service image locally
        run: |
          docker build \
            --file ./services/auth-service/Dockerfile \
            --tag ${{ env.AUTH_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.AUTH_IMAGE }}:latest \
            ./services/auth-service

      - name: Push frontend image to Docker Hub
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      - name: Push auth-service image to Docker Hub
        run: |
          docker push ${{ env.AUTH_IMAGE }}:${{ github.sha }}
          docker push ${{ env.AUTH_IMAGE }}:latest

  deploy-local:
    name: Pull and Run on Local Machine
    runs-on:
      - self-hosted
      - linux
    needs:
      - publish-images
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest application images
        run: docker compose pull frontend auth-service

      - name: Run services from pulled images
        run: docker compose up -d --no-build --force-recreate --remove-orphans

      - name: Show running containers
        run: docker compose ps
