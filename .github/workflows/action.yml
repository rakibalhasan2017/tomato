name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: rakib2017
  FRONTEND_IMAGE: tomato-frontend
  AUTH_IMAGE: tomato-auth-service

jobs:
  ## JOB 1: Lint frontend code
  Lint_frontend:
    name: Lint Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

  ## JOB 2: Lint auth-service
  Lint_auth-service:
    name: Lint Auth Service CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/auth-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./services/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint auth service
        run: npm run lint

  ## JOB 3: Test frontend code
  Test_Frontend:
    name: Test Frontend CI
    runs-on: ubuntu-latest
    needs: Lint_frontend
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (CI validation)
        run: npm run build

  ## JOB 4: Test auth-service code
  Test_auth-service:
    name: Test Auth Service CI
    runs-on: ubuntu-latest
    needs: Lint_auth-service
    defaults:
      run:
        working-directory: ./services/auth-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./services/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test auth service
        run: npm run build

  ## JOB 5: Build and push Docker images for both services
  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs:
      - Test_Frontend
      - Test_auth-service
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push frontend image with BOTH tags
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push auth-service image with BOTH tags
      - name: Build and push auth-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth-service
          file: ./services/auth-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.AUTH_IMAGE }}:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.AUTH_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ## JOB 6: Deploy to local machine
  deploy-local:
    name: Pull and Run on Local Machine
    runs-on: self-hosted
    needs: docker-build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy environment file
        run: |
          if [ ! -f /home/rakib/projects/tomato/.env ]; then
            echo "Host .env file not found at /home/rakib/projects/tomato/.env"
            exit 1
          fi
          cp /home/rakib/projects/tomato/.env .env

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Stop all containers from Docker Compose
        run: |
          echo "Stopping all containers..."
          docker compose down || true

      - name: Remove old containers
        run: |
          echo "Removing old containers..."
          docker rm -f tomato-frontend || true
          docker rm -f auth-service || true
          docker rm -f auth-mongodb || true

      - name: Remove old images (app images only, not mongodb)
        run: |
          echo "Removing old frontend image..."
          docker rmi ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest || true

          echo "Removing old auth-service image..."
          docker rmi ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.AUTH_IMAGE }}:latest || true

      - name: Pull latest images from DockerHub
        run: |
          echo "Pulling latest frontend image..."
          docker pull ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest

          echo "Pulling latest auth-service image..."
          docker pull ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.AUTH_IMAGE }}:latest

      - name: Start containers with Docker Compose
        run: |
          echo "Starting containers with Docker Compose..."
          docker compose up -d --pull always --force-recreate

      - name: Verify containers are running
        run: |
          echo "Verifying containers..."
          docker ps --filter "name=tomato-frontend" --filter "name=auth-service" --filter "name=auth-mongodb"

      - name: Clean up unused images
        run: |
          echo "Cleaning up unused images..."
          docker image prune -af --filter "label!=keep"
